<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <link rel="stylesheet" href="assets/site-shell.css" />
  <script defer src="assets/site-shell.js"></script>
  <title>Posts</title>
  <style>
    :root {
      --bg: #000;
      --fg: #fff;
      --line: #252525;
      --accent: #ff3b30;
      --muted: #b8b8b8;
    }
    .page { max-width: 1100px; margin: 0 auto; padding: 1.5rem 1rem 4rem; }
    .list-header { display: flex; align-items: center; justify-content: flex-end; margin-bottom: 0.5rem; }
    .sort-toggle {
      appearance: none;
      border: 1px solid var(--line);
      background: #050505;
      color: var(--fg);
      font: inherit;
      width: 2.25rem;
      height: 2.25rem;
      padding: 0;
      cursor: pointer;
      display: grid;
      place-items: center;
    }
    .sort-toggle:hover { border-color: var(--accent); color: var(--accent); }
    .post-list { display: flex; flex-direction: column; gap: 1rem; }
    .post-card {
      display: grid;
      grid-template-columns: 220px minmax(0, 1fr);
      gap: 1.25rem;
      padding: 1rem 0;
      border-bottom: 1px solid var(--line);
      align-items: start;
    }
    .post-card img {
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      display: block;
      border: 1px solid var(--line);
    }
    .post-date { color: var(--accent); font-size: 0.95rem; margin-bottom: 0.5rem; }
    .post-card h2 { margin: 0 0 0.5rem 0; font-size: 1.4rem; font-weight: normal; }
    .post-card p { margin: 0 0 0.75rem 0; color: var(--muted); line-height: 1.5; }
    .post-meta { display: flex; flex-wrap: wrap; gap: 1rem; color: var(--muted); font-size: 0.95rem; }
    .post-card:hover h2 { color: var(--accent); }
    .hint { color: var(--muted); line-height: 1.6; }
    @media (max-width: 700px) {
      .post-card { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div data-site-nav data-nav-prefix="" data-nav-section="posts"></div>

  <main class="page">
    <div class="list-header">
      <button class="sort-toggle" id="sortToggle" type="button" aria-label="Toggle post order">^</button>
    </div>

    <section class="post-list" id="postList">
      <a class="post-card" href="posts/reading_list.html" data-date="2026-04-07">
        <img src="images/reading_list/Steel.png" alt="Reading List" />
        <div>
          <div class="post-date">2026-04-07</div>
          <h2>Reading List</h2>
          <p>Articles and resources I have found useful.</p>
          <div class="post-meta">
            
          </div>
        </div>
      </a>

      <a class="post-card" href="posts/engineering_tips.html" data-date="2026-04-06">
        <img src="images/engineering_tips/self_portrait.png" alt="Engineering Tips" />
        <div>
          <div class="post-date">2026-04-06</div>
          <h2>Engineering Tips</h2>
          <p>For people interested in solving problems.</p>
          <div class="post-meta">
            <span>Advice</span>
          </div>
        </div>
      </a>

      <a class="post-card" href="posts/test_post_1.html" data-date="2026-04-04">
        <img src="images/test_post_1/hawkeye.jpg" alt="Test Post 1" />
        <div>
          <div class="post-date">2026-04-04</div>
          <h2>Test Post 1</h2>
          <p>Test</p>
          <div class="post-meta">
            
          </div>
        </div>
      </a>
    </section>
  </main>

  <script>
    const list = document.getElementById("postList");
    const sortToggle = document.getElementById("sortToggle");
    let newestFirst = true;

    function sortItems() {
      const cards = Array.from(list.children);
      cards.sort((a, b) => {
        const aDate = new Date(a.dataset.date);
        const bDate = new Date(b.dataset.date);
        return newestFirst ? bDate - aDate : aDate - bDate;
      });
      cards.forEach((card) => list.appendChild(card));
      sortToggle.textContent = newestFirst ? "^" : "v";
    }

    sortToggle.addEventListener("click", () => {
      newestFirst = !newestFirst;
      sortItems();
    });

    sortItems();
  </script>
</body>
</html>
