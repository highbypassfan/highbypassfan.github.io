<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <link rel="stylesheet" href="../assets/site-shell.css" />
  <script defer src="../assets/site-shell.js"></script>
  <title>Reading List</title>
  <style>
    :root { --bg: #000; --fg: #fff; --line: #252525; --accent: #ff3b30; --muted: #b8b8b8; }
    .page { max-width: 900px; margin: 0 auto; padding: 2rem 1rem 4rem; }
    .eyebrow { color: var(--accent); margin-bottom: 0.75rem; font-size: 0.95rem; }
    h1 { margin: 0 0 0.75rem 0; font-size: 2.2rem; font-weight: normal; letter-spacing: 0.04em; }
    .deck { margin: 0 0 1.5rem 0; color: var(--muted); line-height: 1.6; max-width: 70ch; }
    .hero-figure { margin: 0 0 2rem 0; }
    .hero { width: auto; height: auto; max-width: 100%; max-height: min(60vh, calc((100vw - 2rem) * 0.75), 675px); display: block; border: 1px solid var(--line); margin: 0 auto 2rem; background: #050505; }
    .hero-caption { margin-top: -1.3rem; color: var(--muted); font-size: 0.95rem; line-height: 1.5; text-align: center; }
    .section { padding-top: 1rem; border-top: 1px solid var(--line); margin-top: 1rem; }
    .section h2 { margin: 0 0 0.75rem 0; font-size: 1.25rem; font-weight: normal; color: var(--accent); }
    .post-body p,
    .post-body li { line-height: 1.6; }
    .post-body ul,
    .post-body ol { margin: 0.75rem 0 0 1.25rem; padding: 0; }
    .align-center { text-align: center; }
    .align-left { text-align: left; }
    .post-image {
      width: 100%;
      margin: 2rem auto;
      text-align: center;
    }
    .post-image img,
    .post-image video {
      display: block;
      width: auto;
      max-width: 100%;
      height: auto;
      max-height: min(60vh, calc((100vw - 2rem) * 0.75), 675px);
      margin: 0 auto;
      border: 1px solid var(--line);
    }
    .post-image figcaption {
      margin-top: 0.65rem;
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div data-site-nav data-nav-prefix="../" data-nav-section="reading-list"></div>
  <main class="page">
    <div class="eyebrow" id="previewMeta">2026-04-07</div>
    <h1 id="previewTitle">Reading List</h1>
    <p class="deck" id="previewDeck">Articles and resources I have found useful.</p>
    <figure class="hero-figure" id="previewHeroFigure">
      <img class="hero" id="previewHero" src="../images/reading_list/Steel.png" alt="Reading List" />
      <figcaption class="hero-caption" id="previewHeroCaption">They'll be waiting for awhile!</figcaption>
    </figure>
    <div class="post-body" id="previewBody">
      <p><br></p><p>Personal management:</p><p><!-- obsidian --></p><p><a href="https://guzey.com/follow-up/" class="external-link" target="_blank" rel="noopener nofollow">https://guzey.com/follow-up/</a></p><p><br></p><p></p><p><!-- obsidian --></p><p><a href="https://www.youtube.com/watch?v=4jgTCayWlwc" class="external-link" target="_blank" rel="noopener nofollow">https://www.youtube.com/watch?v=4jgTCayWlwc</a> boe jarnard</p><p>a</p>
    </div>
  </main>
</body>
</html>
